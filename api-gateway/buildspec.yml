version: 0.2
# ─────────────────────────────────────────────────────────────────────────────
# CodeBuild Buildspec — HFT Practice API Gateway
# Pipeline: GitHub push → CodeBuild → ECR push → ECS deploy
# ─────────────────────────────────────────────────────────────────────────────

phases:
  pre_build:
    commands:
      - echo "=== Logging in to Amazon ECR ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URL
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo "Building image for commit $IMAGE_TAG"

  build:
    commands:
      - echo "=== Building Docker image ==="
      - docker build -t $ECR_REPO_URL:latest -t $ECR_REPO_URL:$IMAGE_TAG .
      - echo "Build completed successfully"

  post_build:
    commands:
      - echo "=== Pushing image to ECR ==="
      - docker push $ECR_REPO_URL:latest
      - docker push $ECR_REPO_URL:$IMAGE_TAG
      - echo "=== Writing imagedefinitions.json ==="
      - printf '[{"name":"api-gateway","imageUri":"%s"}]' "$ECR_REPO_URL:latest" > imagedefinitions.json
      - cat imagedefinitions.json
      - echo "=== Deploy complete ==="

artifacts:
  files:
    - imagedefinitions.json
